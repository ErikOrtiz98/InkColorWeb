<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InkColor</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="icon" type="image/png" href="assets/mancha-tinta-6.png">
</head>
<body class="page-contacto">

<nav>
    <a href="index.html" class="logo-link">
        <div class="logo">
             <img src="assets/file_00000000a7e0722fa5edb0c7636377c4.png" alt="Logotipo Grupo Impresión">
        </div>
    </a>
  <div class="nav-links">
    <a href="index.html">Inicio</a>
    <a href="catalogo.html">Catálogo</a>
    <a href="contacto.html" class="active">Contacto</a>
    <span class="hamburger">☰</span>
  </div>
</nav>

<section class="page-header" style="background: linear-gradient(135deg, #0a0a0a, #1a1a1a); padding: 160px 0 60px; text-align: center; color: white;">
  <h1 style="font-size: 3rem;">Contáctanos</h1>
  <p style="font-size: 1.2rem;">Estamos listos para ayudarte con tu proyecto de impresión</p>
</section>

<div class="contact-page-wrapper">
  <div class="contact-info-card">
    <div class="contact-method">
        <div class="contact-icon"><i class="fab fa-whatsapp"></i></div>
        <div>
          <h4>WhatsApp</h4>
          <a href="https://wa.me/525530526764" style="text-decoration: none; color: inherit;">
            <p>55305-26764</p>
          </a>
        </div>
      </div>
      <div class="contact-method">
        <div class="contact-icon"><i class="fab fa-whatsapp"></i></div>
        <div>
          <h4>WhatsApp</h4>
          <a href="https://wa.me/525565105384" style="text-decoration: none; color: inherit;">
            <p>55651-05384</p>
          </a>
        </div>
      </div>
    <div class="contact-method">
      <div class="contact-icon">✉️</div>
      <div><h4>Email</h4><p>ereidc@inkcolor.com</p></div>
    </div>
    <div class="contact-method">
      <div class="contact-icon">⏰</div>
      <div><h4>Horario</h4><p>Lun-Vie: 9am - 6pm<br>Sáb: 10am - 2pm</p></div>
    </div>
  </div>

  <form id="contactFormPage" action="https://formspree.io/f/tu-codigo-aqui" method="POST">
    <div class="form-group">
        <input type="text" name="nombre" id="fullName" placeholder="Nombre completo *" required>
    </div>
    <div class="form-group">
        <input type="email" name="email" id="emailPage" placeholder="Correo electrónico *" required>
    </div>
    <div class="form-group">
        <input type="tel" name="telefono" id="phone" placeholder="Teléfono">
    </div>
    <div class="form-group">
        <input type="text" name="producto" id="productInterest" placeholder="Selecciona un producto de interés">
    </div>
    <div class="form-group">
        <textarea rows="5" name="mensaje" id="messagePage" placeholder="Cuéntanos sobre tu proyecto..."></textarea>
    </div>
    <!-- Campo oculto para redirección después del envío -->
    <input type="hidden" name="_next" value="https://tusitio.com/gracias.html">
    <button type="submit" class="btn-send">Enviar mensaje</button>
    <div id="formFeedbackPage" class="alert-msg"></div>
</form>


<footer>
  © 2025 <span>Grupo InkColor</span> — Todos los derechos reservados.
</footer>

<script src="script.js"></script>
<script>
  // Detectar producto desde el catálogo (si viene por URL)
  const urlParams = new URLSearchParams(window.location.search);
  const producto = urlParams.get('producto');
  if (producto) {
    const select = document.getElementById('productInterest');
    if (select) {
      for (let i = 0; i < select.options.length; i++) {
        if (select.options[i].value === producto || select.options[i].text === producto) {
          select.selectedIndex = i;
          break;
        }
      }
    }
    const msgField = document.getElementById('messagePage');
    if (msgField && !msgField.value) {
      msgField.value = `Hola, me interesa cotizar: ${producto}`;
    }
  }
</script>
</body>
</html>
